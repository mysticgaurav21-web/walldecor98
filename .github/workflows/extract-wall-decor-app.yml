name: Extract WallDecor99 application

on:
  push:
    paths:
      - '.github/workflows/extract-wall-decor-app.yml'
      - '.upload/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and extract project
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          chunks=(.upload/chunk-*.b64)
          if [ ${#chunks[@]} -eq 0 ]; then
            echo "No upload chunks found; nothing to extract."
            exit 0
          fi
          cat "${chunks[@]}" | tr -d '\r\n' | base64 --decode > /tmp/walldecor99.zip
          unzip -t /tmp/walldecor99.zip
          unzip -o /tmp/walldecor99.zip -d /tmp/walldecor99-extracted
          source_dir=/tmp/walldecor99-extracted
          top_entries=("$source_dir"/*)
          if [ ${#top_entries[@]} -eq 1 ] && [ -d "${top_entries[0]}" ]; then
            source_dir="${top_entries[0]}"
          fi
          rsync -a --exclude='.git/' "$source_dir"/ ./
          rm -rf .upload

      - name: Commit extracted application
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Upload complete WallDecor99 production web app"
          git push origin HEAD:main
